name: Release

# Publishes a GitHub Release with the built plugin JAR whenever a version tag
# is pushed (e.g. `v2.1.0`). The tag drives the released version: the POM, the
# generated BuildConstants, and plugin.yml are all set from it so the artifact
# version always matches the tag. This is the download source the bot's
# /api/.../minecraft/plugin/latest endpoint reads from.

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set POM version from tag
        run: mvn -B versions:set -DnewVersion=${{ steps.ver.outputs.version }} -DgenerateBackupPoms=false

      - name: Build with Maven
        run: mvn -B clean package

      - name: Mark prerelease for -rc/-beta tags
        id: pre
        run: |
          if [[ "${{ steps.ver.outputs.version }}" == *-* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "target/heimdall-whitelist-${{ steps.ver.outputs.version }}.jar" \
            --title "HeimdallWhitelist ${{ steps.ver.outputs.version }}" \
            --generate-notes ${{ steps.pre.outputs.flag }}
